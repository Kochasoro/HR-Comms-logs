{% extends "base.html" %}

{% block title %}New Memo{% endblock %}

{% block content %}
<label>Type:</label>
<select id="source_type_outside" onchange="updateFormFields()">
    <option value="">--Select Type--</option>
    <option value="General">General</option>
    <option value="OP">OP</option>
</select>
<br><br>

<h2>New Memo</h2>

<!-- Source Type Outside the Form -->

<form method="POST" id="memo_form">
  <input type="hidden" name="source_type" id="source_type_hidden">

  <!-- Memo Number -->
  <label>Memo #:</label>
  <input name="memo_number" required><br><br>

  <!-- Date -->
  <label>Date:</label>
  <input type="date" name="date" id="date_field"><br><br>

  <!-- Subject -->
  <label>Subject:</label>
  <input name="subject" required><br><br>

  <!-- From Office -->
  <label>From:</label>
  <input name="from_office" id="from_office" required><br><br>

  <!-- Forwarded By -->
  <label>Forwarded By:</label>
  <input name="forwarded_by" id="forwarded_by" required><br><br>

  <!-- Remarks -->
  <label>Remarks:</label>
  <input name="remarks"><br><br>

  <!-- Notes -->
  <label>Notes:</label>
  <textarea name="notes"></textarea><br><br>



  <button type="submit">Save</button>
</form>
<!-- Modal -->
<div id="successModal" class="modal">
  <div class="modal-content">
    <h3>✅ Memo Saved</h3>
    <p id="modalText"></p>
    <button onclick="closeModal()">Close</button>
  </div>
</div>


<style>
.modal {
  display: none;
  position: fixed;
  z-index: 1000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0.5);
}

.modal-content {
  background: white;
  padding: 20px;
  margin: 15% auto;
  width: 300px;
  border-radius: 8px;
  text-align: center;
}
</style>


<script>
const form = document.getElementById("memo_form");

form.addEventListener("submit", function(e) {
    e.preventDefault();

    const formData = new FormData(form);

    fetch("", {
        method: "POST",
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {

            document.getElementById("modalText").innerHTML =
                "<strong>Memo #:</strong> " + data.memo_number + "<br>" +
                "<strong>Subject:</strong> " + data.subject;

            document.getElementById("successModal").style.display = "block";

            form.reset();
        }
    })
    .catch(error => {
        alert("Error saving memo.");
    });
});

function closeModal() {
    document.getElementById("successModal").style.display = "none";
}


// Elements
const typeSelect = document.getElementById('source_type_outside');
const hiddenType = document.getElementById('source_type_hidden');
const fromOffice = document.getElementById('from_office');
const forwardedBy = document.getElementById('forwarded_by');
const dateField = document.getElementById('date_field');

// Set today's date automatically
dateField.valueAsDate = new Date();

// 🔹 On page load
window.onload = function() {
    // Check if a previous selection exists
    const savedType = localStorage.getItem("lastSelectedType");

    if (savedType) {
        typeSelect.value = savedType;
    } else {
        // Default to General
        typeSelect.value = "General";
    }

    updateFormFields();
};

// 🔹 When user changes selection
typeSelect.addEventListener("change", function() {
    const selected = typeSelect.value;

    // Save selection
    localStorage.setItem("lastSelectedType", selected);

    updateFormFields();
});

// 🔹 Update form fields + hidden input
function updateFormFields() {
    const type = typeSelect.value;

    hiddenType.value = type;  // Sync hidden input

    if (type === 'OP') {
        fromOffice.value = 'OP';
        forwardedBy.value = 'Records';
    } else if (type === 'General') {
        fromOffice.value = '';
        forwardedBy.value = '';
    }
}
</script>
{% endblock %}
