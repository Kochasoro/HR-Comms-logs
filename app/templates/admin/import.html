{% block page_css %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/impexp.css') }}">
{% endblock %}

{% extends "base.html" %}

{% block content %}

<div class="main-content">
  <div class="section-badge">
    Import & Export
  </div>

  <div class="cards-grid">
    <div class="ui-card">
      <h2 class="card-header">Import Records</h2>
      <div class="card-content">
        <p class="instruction">Upload file (Accepts .xlsx and .csv files)</p>
        <div class="input-row">
          <label for="file-upload" class="btn-choose">Choose File:</label>
          <input type="file" id="file-upload" name="file" hidden>
          <input type="text" id="file-display" class="file-display" placeholder="Ex: filename.csv / filename.xlsx" readonly>
          <button id="upload-btn" type="button" class="btn-action">Upload</button>          
        </div>
      </div>
        <p id="import-message" class="validation-text" style="display:none;"></p>
      <div class="ui-card">
        <h2 class="card-header">Export Data</h2>
        <div class="card-content">
          <div class="form-item">
            <label>Memo Type:</label>
            <div class="check-group">
              <label><input type="checkbox" id="type-cm"> Communications (CM)</label>
              <label><input type="checkbox" id="type-op"> Memo (OP)</label>
            </div>
          </div>

          <div class="form-item">
            <label>Date From:</label>
            <input type="date" id="date-from" class="input-field">
          </div>

          <div class="form-item">
            <label>Date To:</label>
            <input type="date" id="date-to" class="input-field">
          </div>



          <button id="generate-export" class="btn-action">Generate Export</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
const fileInput = document.getElementById("file-upload");
const fileDisplay = document.getElementById("file-display");
const uploadBtn = document.getElementById("upload-btn");

// show filename
fileInput.addEventListener("change", () => {
    if (fileInput.files.length > 0) {
        fileDisplay.value = fileInput.files[0].name;
    }
    
});

// upload
uploadBtn.addEventListener("click", async () => {

    if (!fileInput.files.length) {
        alert("Please select a file first");
        return;
    }

    const formData = new FormData();
    formData.append("file", fileInput.files[0]);

    try {
        const res = await fetch("/admin/import-memos", {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
            alert(data.error || "Import failed");
            return;
        }

        alert(`Imported: ${data.imported}, Skipped: ${data.skipped}`);

        // optional refresh
        window.location.reload();

    } catch (err) {
        console.error(err);
        alert("Upload error");
    }

});

document.getElementById("generate-export").addEventListener("click", () => {

  const cm = document.getElementById("type-cm").checked;
  const op = document.getElementById("type-op").checked;

  const dateFrom = document.getElementById("date-from").value;
  const dateTo = document.getElementById("date-to").value;

  if(!cm && !op){
    alert("Select at least one memo type.");
    return;
  }

  const params = new URLSearchParams({
    cm,
    op,
    excel: true,  
    dateFrom,
    dateTo
  });

  window.location.href = "/admin/export-memos?" + params.toString();

});
</script>
{% endblock %}
