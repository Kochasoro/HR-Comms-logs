<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            overflow-x: hidden;
        }

        .sidebar {
            height: 100vh;
            background-color: #1f2937;
        }

        .sidebar a {
            color: #cbd5e1;
            text-decoration: none;
            padding: 12px 20px;
            display: block;
        }

        .sidebar a:hover {
            background-color: #374151;
            color: white;
        }

        .sidebar .active {
            background-color: #2563eb;
            color: white;
        }

        .content {
            padding: 30px;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar p-0">
            <h4 class="text-white text-center py-4 border-bottom">Admin Panel</h4>

            <a href="{{ url_for('admin.dashboard') }}" class="active">Dashboard</a>
            <a href="#">Manage Users</a>
            <a href="#">Memos</a>
            <a href="#">Reports</a>
            <a href="#">Settings</a>

            <div class="mt-5 text-center">
                <a href="{{ url_for('auth.logout') }}" class="text-danger">Logout</a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 content">

            <!-- Top Navbar -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Dashboard</h2>
                <div>
                    Welcome, <strong>{{ current_user.username }}</strong>
                </div>
            </div>

            <!-- Dashboard Cards -->
            <div class="row">

                <div class="col-md-4">
                    <div class="card shadow-sm mb-4">
                        <div class="card-body">
                            <h5>Total Users</h5>
                            <h2>120</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card shadow-sm mb-4">
                        <div class="card-body">
                            <h5>Total Memos</h5>
                            <h2>45</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card shadow-sm mb-4">
                        <div class="card-body">
                            <h5>Pending Approvals</h5>
                            <h2>8</h2>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Example Table -->
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>Recent Activity</h5>
                    <table class="table mt-3">
                        <thead>
                            <tr>
                                <th>User</th>
                                <th>Action</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>John</td>
                                <td>Created Memo</td>
                                <td>March 4, 2026</td>
                            </tr>
                            <tr>
                                <td>Anna</td>
                                <td>Approved Leave</td>
                                <td>March 3, 2026</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
