{% extends "admin/admin_base.html" %}
{% block content %}

        <div class="col-md-10 content">

            <!-- Top Navbar -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Dashboard</h2>
                <div>
                    Welcome, <strong>{{ current_user.username }}</strong>
                </div>
            </div>

            <!-- Dashboard Cards -->
            <div class="row">

                <div class="col-md-4">
                    <div class="card shadow-sm mb-4">
                        <div class="card-body">
                            <h5>Total Users</h5>
                            <h2>120</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card shadow-sm mb-4">
                        <div class="card-body">
                            <h5>Total Memos</h5>
                            <h2>45</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card shadow-sm mb-4">
                        <div class="card-body">
                            <h5>Pending Approvals</h5>
                            <h2>8</h2>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Example Table -->
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>Recent Activity</h5>
                    <table class="table mt-3">
                        <thead>
                            <tr>
                                <th>User</th>
                                <th>Action</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>John</td>
                                <td>Created Memo</td>
                                <td>March 4, 2026</td>
                            </tr>
                            <tr>
                                <td>Anna</td>
                                <td>Approved Leave</td>
                                <td>March 3, 2026</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
{% endblock %}
