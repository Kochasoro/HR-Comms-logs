<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            overflow-x: hidden;
        }

        .sidebar {
            height: 100vh;
            background-color: #1f2937;
        }

        .sidebar a {
            color: #cbd5e1;
            text-decoration: none;
            padding: 12px 20px;
            display: block;
        }

        .sidebar a:hover {
            background-color: #374151;
            color: white;
        }

        .sidebar .active {
            background-color: #2563eb;
            color: white;
        }

        .content {
            padding: 30px;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar p-0">
            <h4 class="text-white text-center py-4 border-bottom">Admin Panel</h4>

            <a href="{{ url_for('admin.dashboard') }}" class="active">Dashboard</a>
            <a href="{{ url_for('admin.users') }}">Manage Users</a>
            <a href="#">Memos</a>
            <a href="#">Reports</a>
            <a href="{{ url_for('admin.settings_general') }}">Settings</a>

            <div class="mt-5 text-center">
                <a href="{{ url_for('auth.logout') }}" class="text-danger">Logout</a>
            </div>
        </div>

        {% block content %}{% endblock %}
        <!-- Main Content -->


    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
