<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<style>
body {
    margin: 0;
    min-height: 100vh;
    font-family: Arial, sans-serif;

    background: url("/static/img/bg.jpg") no-repeat center center fixed;
    background-size: cover;
}
body::before {
    content: "";
    position: fixed;
    inset: 0;

    backdrop-filter: blur(6px);           /* 🔥 blur effect */
    background: rgba(255, 255, 255, 0.4); /* 🔥 bright overlay */

    z-index: -1;
}
.login-container {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}
.login-card {
    background: rgba(255, 255, 255, 0.75);
    backdrop-filter: blur(10px);

    padding: 30px;
    border-radius: 14px;

    width: 100%;
    max-width: 350px;

    text-align: center;

    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
}
</style>

<body>

<div class="login-container">

    <div class="login-card">

        {% if settings and settings.logo %}
        <img src="{{ url_for('static', filename=settings.logo) }}" class="logo">
        {% else %}
        <img src="{{ url_for('static', filename='img/logo.png') }}" class="logo">
        {% endif %}

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="error">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <form method="POST">

            <input type="text" name="username" placeholder="Username" required>

            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Login</button>

        </form>

        <a class="guest" href="{{ url_for('main.home') }}">
            Log in as Guest
        </a>

        <div class="footer">
            Version 1.0
        </div>

    </div>

</div>

</body>
</html>
